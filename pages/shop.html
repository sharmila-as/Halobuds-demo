<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Halo Buds</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .shop-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: var(--space-8);
      align-items: start;
    }

    .shop-sidebar {
      position: sticky;
      top: calc(var(--header-height) + 1.5rem);
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(196,168,224,0.15);
    }

    .filter-group {
      margin-bottom: var(--space-6);
    }

    .filter-group:last-child {
      margin-bottom: 0;
    }

    .filter-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 500;
      color: var(--purple-deep);
      margin-bottom: var(--space-3);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--grey-100);
    }

    .filter-options {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      cursor: pointer;
      font-size: var(--text-sm);
      color: var(--grey-600);
      transition: color var(--transition-fast);
    }

    .filter-option:hover {
      color: var(--purple-brand);
    }

    .filter-option input[type="checkbox"],
    .filter-option input[type="radio"] {
      accent-color: var(--purple-brand);
      width: 16px;
      height: 16px;
    }

    .price-range {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }

    .price-input {
      padding: var(--space-2) var(--space-3);
      border: 1.5px solid var(--grey-200);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      outline: none;
    }

    .price-input:focus {
      border-color: var(--purple-soft);
    }

    .filter-clear-btn {
      width: 100%;
      padding: var(--space-3);
      border: 1.5px solid var(--grey-200);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      color: var(--grey-500);
      cursor: pointer;
      transition: all var(--transition-fast);
      background: none;
      margin-top: var(--space-4);
    }

    .filter-clear-btn:hover {
      border-color: var(--purple-brand);
      color: var(--purple-brand);
    }

    .shop-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .shop-count {
      font-size: var(--text-sm);
      color: var(--grey-500);
    }

    .shop-sort {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
    }

    .shop-sort select {
      padding: 0.5rem 1rem;
      border: 1.5px solid var(--grey-200);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
      cursor: pointer;
      background: var(--white);
      color: var(--grey-700);
      outline: none;
    }

    .shop-sort select:focus {
      border-color: var(--purple-soft);
    }

    .shop-view-toggle {
      display: flex;
      gap: var(--space-1);
    }

    .shop-view-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--grey-200);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      color: var(--grey-400);
      background: none;
    }

    .shop-view-btn.active {
      border-color: var(--purple-brand);
      color: var(--purple-brand);
      background: var(--purple-pale);
    }

    .active-filters {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }

    .active-filter-tag {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding: 4px 12px;
      background: var(--purple-pale);
      color: var(--purple-brand);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
    }

    .active-filter-tag:hover {
      background: var(--purple-brand);
      color: white;
    }

    .load-more-btn {
      display: block;
      margin: var(--space-10) auto 0;
    }

    .mobile-filter-btn {
      display: none;
    }

    @media (max-width: 900px) {
      .shop-layout {
        grid-template-columns: 1fr;
      }

      .shop-sidebar {
        display: none;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: var(--z-modal);
        width: min(320px, 90vw);
        border-radius: 0;
        overflow-y: auto;
      }

      .shop-sidebar.mobile-open {
        display: block;
      }

      .mobile-filter-btn {
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }
    }
  </style>
</head>
<body>
<!-- Header -->
<header class="header" id="header">
  <div class="container">
    <div class="header-inner">
      <a href="../index.html" class="header-logo">
        <div class="header-logo-mark">HB</div>
        <div class="header-logo-text">
          <span class="header-logo-name">HALO BUDS</span>
          <span class="header-logo-tagline">Handmade & Customized</span>
        </div>
      </a>
      <nav class="header-nav">
        <a href="../index.html" class="header-nav-link">Home</a>
        <a href="shop.html" class="header-nav-link active">Shop</a>
        <a href="custom-order.html" class="header-nav-link">Custom Order</a>
        <a href="about.html" class="header-nav-link">About</a>
        <a href="contact.html" class="header-nav-link">Contact</a>
      </nav>
      <div class="header-actions">
        <a href="search.html" class="header-action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </a>
        <a href="wishlist.html" class="header-action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </a>
        <a href="cart.html" class="header-action-btn" style="position:relative">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge">0</span>
        </a>
        <a href="account.html" class="header-action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <div class="header-mobile-toggle" id="mobileToggle"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>
</header>

<!-- Page Header -->
<div class="page-header">
  <div class="container">
    <div class="page-breadcrumb">
      <a href="../index.html">Home</a>
      <span>›</span>
      <span id="breadcrumbCurrent">Shop</span>
    </div>
    <h1 class="page-title" id="pageTitle">Our Collection</h1>
    <p style="color:var(--grey-500);margin-top:var(--space-3);font-size:var(--text-lg);font-weight:300;" id="pageSubtitle">Every piece handcrafted with love</p>
  </div>
</div>

<!-- Shop Content -->
<div class="section">
  <div class="container">
    <!-- Toolbar -->
    <div class="shop-toolbar">
      <div style="display:flex;align-items:center;gap:var(--space-3);">
        <button class="btn btn-outline btn-sm mobile-filter-btn" id="mobileFilterBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filters
        </button>
        <span class="shop-count" id="shopCount">Loading products...</span>
      </div>
      <div class="shop-sort">
        <span style="font-size:var(--text-sm);color:var(--grey-500);">Sort by:</span>
        <select id="sortSelect">
          <option value="newest">Newest First</option>
          <option value="popular">Most Popular</option>
          <option value="rating">Top Rated</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
        </select>
      </div>
    </div>

    <!-- Active Filters -->
    <div class="active-filters" id="activeFilters"></div>

    <div class="shop-layout">
      <!-- Sidebar Filters -->
      <aside class="shop-sidebar" id="shopSidebar">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-5);">
          <h3 style="font-family:var(--font-display);font-size:var(--text-2xl);color:var(--purple-deep);">Filters</h3>
          <button onclick="document.getElementById('shopSidebar').classList.remove('mobile-open')" style="display:none" id="closeSidebar">✕</button>
        </div>

        <!-- Category -->
        <div class="filter-group">
          <div class="filter-title">Category</div>
          <div class="filter-options" id="categoryFilters">
            <label class="filter-option">
              <input type="radio" name="category" value=""> All Categories
            </label>
          </div>
        </div>

        <!-- Price Range -->
        <div class="filter-group">
          <div class="filter-title">Price Range</div>
          <div class="price-range">
            <input type="number" class="price-input" id="priceMin" placeholder="₹ Min">
            <input type="number" class="price-input" id="priceMax" placeholder="₹ Max">
          </div>
          <button class="filter-clear-btn" onclick="applyPriceFilter()" style="margin-top:var(--space-3);">Apply Price</button>
        </div>

        <!-- Special -->
        <div class="filter-group">
          <div class="filter-title">Special</div>
          <div class="filter-options">
            <label class="filter-option"><input type="checkbox" id="filterCustomizable"> Customizable</label>
            <label class="filter-option"><input type="checkbox" id="filterBestseller"> Best Sellers</label>
            <label class="filter-option"><input type="checkbox" id="filterNew"> New Arrivals</label>
          </div>
        </div>

        <button class="filter-clear-btn" onclick="clearFilters()">Clear All Filters</button>
      </aside>

      <!-- Products Grid -->
      <div>
        <div class="products-grid" id="productsGrid">
          <div style="text-align:center;padding:3rem;grid-column:1/-1;">
            <div class="loading-spinner"></div>
          </div>
        </div>
        <button class="btn btn-outline btn-lg load-more-btn hidden" id="loadMoreBtn">Load More</button>
      </div>
    </div>
  </div>
</div>

<!-- Footer placeholder -->
<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p class="footer-bottom-text">© 2025 Halo Buds. Handcrafted with ❤ in Chennai, India.</p>
    </div>
  </div>
</footer>

<script src="../js/config.js"></script>
<script>
let currentFilters = {
  category: '',
  priceMin: null,
  priceMax: null,
  customizable: false,
  bestseller: false,
  newArrival: false,
  sort: 'newest',
  search: ''
};
let currentOffset = 0;
const PAGE_SIZE = 12;
let totalProducts = 0;

document.addEventListener('DOMContentLoaded', async () => {
  // Parse URL params
  const params = new URLSearchParams(window.location.search);
  const categorySlug = params.get('category');
  const filter = params.get('filter');
  const search = params.get('q');

  if (filter === 'bestseller') { currentFilters.bestseller = true; document.getElementById('pageTitle').textContent = 'Best Sellers'; }
  if (filter === 'new') { currentFilters.newArrival = true; document.getElementById('pageTitle').textContent = 'New Arrivals'; }
  if (filter === 'featured') { document.getElementById('pageTitle').textContent = 'Featured'; }
  if (search) { currentFilters.search = search; document.getElementById('pageTitle').textContent = `Results for "${search}"`; }

  await loadCategories(categorySlug);
  await loadProducts();

  // Scroll header
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 20);
  window.addEventListener('scroll', () => document.getElementById('header').classList.toggle('scrolled', window.scrollY > 20));

  // Sort listener
  document.getElementById('sortSelect').addEventListener('change', e => {
    currentFilters.sort = e.target.value;
    currentOffset = 0;
    loadProducts();
  });

  // Filter listeners
  document.getElementById('filterCustomizable').addEventListener('change', e => { currentFilters.customizable = e.target.checked; currentOffset = 0; loadProducts(); updateActiveFilters(); });
  document.getElementById('filterBestseller').addEventListener('change', e => { currentFilters.bestseller = e.target.checked; currentOffset = 0; loadProducts(); updateActiveFilters(); });
  document.getElementById('filterNew').addEventListener('change', e => { currentFilters.newArrival = e.target.checked; currentOffset = 0; loadProducts(); updateActiveFilters(); });

  // Load more
  document.getElementById('loadMoreBtn').addEventListener('click', () => {
    currentOffset += PAGE_SIZE;
    loadProducts(true);
  });

  // Mobile filter
  document.getElementById('mobileFilterBtn')?.addEventListener('click', () => {
    const sidebar = document.getElementById('shopSidebar');
    sidebar.classList.toggle('mobile-open');
    document.getElementById('closeSidebar').style.display = 'block';
  });
});

async function loadCategories(activeSlug) {
  const { data: cats } = await Categories.getAll();
  const container = document.getElementById('categoryFilters');
  if (!cats) return;

  container.innerHTML = `
    <label class="filter-option">
      <input type="radio" name="category" value="" ${!activeSlug ? 'checked' : ''}> All Categories
    </label>
    ${cats.map(cat => `
      <label class="filter-option">
        <input type="radio" name="category" value="${cat.id}" ${cat.slug === activeSlug ? 'checked' : ''}> ${cat.name}
      </label>
    `).join('')}
  `;

  if (activeSlug) {
    const activeCat = cats.find(c => c.slug === activeSlug);
    if (activeCat) {
      currentFilters.category = activeCat.id;
      document.getElementById('pageTitle').textContent = activeCat.name;
      document.getElementById('breadcrumbCurrent').textContent = activeCat.name;
    }
  }

  container.querySelectorAll('input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', () => {
      currentFilters.category = radio.value;
      currentOffset = 0;
      loadProducts();
      updateActiveFilters();
    });
  });
}

async function loadProducts(append = false) {
  const grid = document.getElementById('productsGrid');
  if (!append) {
    grid.innerHTML = `<div style="text-align:center;padding:3rem;grid-column:1/-1;"><div class="loading-spinner"></div></div>`;
  }

  let query = supabaseClient
    .from('products')
    .select('*, categories(name, slug)', { count: 'exact' })
    .eq('is_active', true);

  if (currentFilters.category) query = query.eq('category_id', currentFilters.category);
  if (currentFilters.bestseller) query = query.eq('is_bestseller', true);
  if (currentFilters.newArrival) query = query.eq('is_new_arrival', true);
  if (currentFilters.customizable) query = query.eq('allow_customization', true);
  if (currentFilters.search) query = query.ilike('name', `%${currentFilters.search}%`);
  if (currentFilters.priceMin) query = query.gte('price', currentFilters.priceMin);
  if (currentFilters.priceMax) query = query.lte('price', currentFilters.priceMax);

  const sortMap = {
    price_asc: ['price', true],
    price_desc: ['price', false],
    rating: ['rating', false],
    newest: ['created_at', false],
    popular: ['review_count', false]
  };
  const [sortCol, sortAsc] = sortMap[currentFilters.sort] || ['created_at', false];
  query = query.order(sortCol, { ascending: sortAsc }).range(currentOffset, currentOffset + PAGE_SIZE - 1);

  const { data: products, count } = await query;
  totalProducts = count || 0;

  document.getElementById('shopCount').textContent = `${totalProducts} product${totalProducts !== 1 ? 's' : ''}`;

  if (!products || products.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <span class="empty-state-icon">🌸</span>
        <div class="empty-state-title">No products found</div>
        <p class="empty-state-desc">Try adjusting your filters or browse all our handcrafted pieces.</p>
        <button class="btn btn-primary" onclick="clearFilters()">Clear Filters</button>
      </div>
    `;
    document.getElementById('loadMoreBtn').classList.add('hidden');
    return;
  }

  const html = products.map(p => renderProductCard(p)).join('');
  if (append) {
    grid.insertAdjacentHTML('beforeend', html);
  } else {
    grid.innerHTML = html;
  }

  const showLoadMore = currentOffset + PAGE_SIZE < totalProducts;
  document.getElementById('loadMoreBtn').classList.toggle('hidden', !showLoadMore);

  initProductCardActions();
}

function renderProductCard(p) {
  const discount = p.compare_price ? Math.round((1 - p.price / p.compare_price) * 100) : 0;
  const img = p.images?.[0] || 'https://images.unsplash.com/photo-1519741497674-611481863552?w=800';
  return `
    <div class="product-card">
      <div class="product-card-image-wrap" style="aspect-ratio:4/5;">
        <img src="${img}" alt="${p.name}" loading="lazy">
        <div class="product-card-badges">
          ${p.is_new_arrival ? '<span class="badge badge-new">New</span>' : ''}
          ${p.is_bestseller ? '<span class="badge badge-bestseller">Bestseller</span>' : ''}
          ${p.allow_customization ? '<span class="badge badge-custom">✨ Custom</span>' : ''}
          ${discount > 0 ? `<span class="badge badge-sale">${discount}% off</span>` : ''}
        </div>
        <div class="product-card-actions">
          <button class="product-card-action wishlist-btn" data-id="${p.id}" title="Wishlist">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
      </div>
      <div class="product-card-body">
        <div class="product-card-category">${p.categories?.name || 'Handmade'}</div>
        <a href="product.html?slug=${p.slug}">
          <div class="product-card-name">${p.name}</div>
        </a>
        <div class="product-card-rating">
          <div class="stars">${[1,2,3,4,5].map(i => `<span class="star ${i <= Math.round(p.rating || 0) ? 'filled' : ''}">★</span>`).join('')}</div>
          <span class="rating-count">${p.review_count > 0 ? `(${p.review_count})` : 'New'}</span>
        </div>
        <div class="product-card-price">
          <span class="price-current">${Utils.formatPrice(p.price)}</span>
          ${p.compare_price ? `<span class="price-compare">${Utils.formatPrice(p.compare_price)}</span>` : ''}
          ${discount > 0 ? `<span class="price-discount">-${discount}%</span>` : ''}
        </div>
        <div class="product-card-footer">
          <button class="btn btn-outline btn-sm add-to-cart-btn" data-id="${p.id}">Add to Cart</button>
          <a href="product.html?slug=${p.slug}" class="btn btn-primary btn-sm">View</a>
        </div>
      </div>
    </div>
  `;
}

function initProductCardActions() {
  document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      btn.disabled = true; btn.textContent = '...';
      await Cart.add(id, 1);
      Utils.showToast('Added to cart! 🛒');
      btn.textContent = '✓ Added';
      setTimeout(() => { btn.textContent = 'Add to Cart'; btn.disabled = false; }, 2000);
    });
  });

  document.querySelectorAll('.wishlist-btn').forEach(btn => {
    Wishlist.isInWishlist(btn.dataset.id).then(is => { if (is) btn.classList.add('active'); });
    btn.addEventListener('click', async () => {
      const { added } = await Wishlist.toggle(btn.dataset.id);
      btn.classList.toggle('active', added);
      Utils.showToast(added ? 'Added to wishlist 💜' : 'Removed from wishlist', added ? 'success' : 'info');
    });
  });
}

function applyPriceFilter() {
  currentFilters.priceMin = document.getElementById('priceMin').value || null;
  currentFilters.priceMax = document.getElementById('priceMax').value || null;
  currentOffset = 0;
  loadProducts();
  updateActiveFilters();
}

function clearFilters() {
  currentFilters = { category: '', priceMin: null, priceMax: null, customizable: false, bestseller: false, newArrival: false, sort: currentFilters.sort, search: '' };
  document.querySelectorAll('input[name="category"]')[0].checked = true;
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.getElementById('filterCustomizable').checked = false;
  document.getElementById('filterBestseller').checked = false;
  document.getElementById('filterNew').checked = false;
  currentOffset = 0;
  loadProducts();
  updateActiveFilters();
}

function updateActiveFilters() {
  const tags = [];
  if (currentFilters.bestseller) tags.push({ label: 'Best Sellers', clear: () => { currentFilters.bestseller = false; document.getElementById('filterBestseller').checked = false; currentOffset = 0; loadProducts(); updateActiveFilters(); } });
  if (currentFilters.newArrival) tags.push({ label: 'New Arrivals', clear: () => { currentFilters.newArrival = false; document.getElementById('filterNew').checked = false; currentOffset = 0; loadProducts(); updateActiveFilters(); } });
  if (currentFilters.customizable) tags.push({ label: 'Customizable', clear: () => { currentFilters.customizable = false; document.getElementById('filterCustomizable').checked = false; currentOffset = 0; loadProducts(); updateActiveFilters(); } });
  if (currentFilters.priceMin || currentFilters.priceMax) tags.push({ label: `₹${currentFilters.priceMin || 0} - ₹${currentFilters.priceMax || '∞'}`, clear: () => { currentFilters.priceMin = null; currentFilters.priceMax = null; document.getElementById('priceMin').value = ''; document.getElementById('priceMax').value = ''; currentOffset = 0; loadProducts(); updateActiveFilters(); } });

  const container = document.getElementById('activeFilters');
  container.innerHTML = tags.map((t, i) => `
    <span class="active-filter-tag" onclick="${i}">${t.label} ✕</span>
  `).join('');

  container.querySelectorAll('.active-filter-tag').forEach((el, i) => {
    el.addEventListener('click', tags[i].clear);
  });
}
</script>
</body>
</html>
