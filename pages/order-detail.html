<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Details — Halo Buds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Great+Vibes&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<style>
.page-hero { background: linear-gradient(135deg, #f8f5ff 0%, #fdf2f8 100%); padding: 2.5rem 0 1.5rem; }
.page-hero .script-title { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: var(--purple-brand); display: block; }
.page-hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 400; color: var(--text-dark); }
.page-hero .breadcrumb { font-family: 'Jost', sans-serif; font-size: 0.82rem; color: var(--text-light); margin-top: 0.4rem; }
.page-hero .breadcrumb a { color: var(--purple-brand); text-decoration: none; }
.order-layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; padding: 3rem 0; }
.panel { background: white; border-radius: 20px; border: 1px solid var(--border); padding: 2rem; margin-bottom: 1.5rem; }
.panel h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; color: var(--text-dark); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
.order-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
.meta-item { }
.meta-label { font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.3rem; }
.meta-value { font-family: 'Jost', sans-serif; font-size: 0.9rem; color: var(--text-dark); font-weight: 500; }
.status-badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.875rem; border-radius: 100px; font-family: 'Jost', sans-serif; font-size: 0.8rem; font-weight: 600; }
.status-pending { background: #fffbeb; color: #92400e; }
.status-confirmed { background: #eff6ff; color: #1d4ed8; }
.status-processing { background: #f5f3ff; color: #6d28d9; }
.status-shipped { background: #ecfeff; color: #0e7490; }
.status-delivered { background: #f0fdf4; color: #166534; }
.status-cancelled { background: #fff5f5; color: #c53030; }
/* Timeline */
.timeline { position: relative; padding-left: 2rem; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(to bottom, var(--purple-brand), var(--purple-pale)); }
.timeline-item { position: relative; padding-bottom: 1.75rem; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-dot { position: absolute; left: -1.55rem; width: 20px; height: 20px; border-radius: 50%; background: white; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; z-index: 1; }
.timeline-dot.done { background: var(--purple-brand); border-color: var(--purple-brand); color: white; }
.timeline-dot.current { background: white; border-color: var(--purple-brand); box-shadow: 0 0 0 4px rgba(107,63,160,0.15); }
.timeline-title { font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--text-dark); }
.timeline-desc { font-family: 'Jost', sans-serif; font-size: 0.82rem; color: var(--text-medium); margin-top: 0.2rem; }
.timeline-time { font-family: 'Jost', sans-serif; font-size: 0.75rem; color: var(--text-light); margin-top: 0.15rem; }
/* Order Items */
.order-item-row { display: flex; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border-light); align-items: center; }
.order-item-row:last-child { border-bottom: none; }
.item-img { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; background: var(--purple-pale); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 1px solid var(--border); }
.item-info { flex: 1; }
.item-name { font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--text-dark); text-decoration: none; }
.item-name:hover { color: var(--purple-brand); }
.item-meta { font-family: 'Jost', sans-serif; font-size: 0.8rem; color: var(--text-light); margin-top: 0.2rem; }
.item-price { font-family: 'Jost', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--purple-brand); }
/* Summary sidebar */
.summary-row { display: flex; justify-content: space-between; font-family: 'Jost', sans-serif; font-size: 0.9rem; color: var(--text-medium); padding: 0.5rem 0; border-bottom: 1px solid var(--border-light); }
.summary-row.total { font-weight: 700; font-size: 1rem; color: var(--text-dark); border-top: 2px solid var(--border); border-bottom: none; padding-top: 0.75rem; }
.shipping-info { font-family: 'Jost', sans-serif; font-size: 0.85rem; color: var(--text-medium); line-height: 1.6; }
.shipping-info strong { color: var(--text-dark); display: block; margin-bottom: 0.25rem; }
.btn-back { display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Jost', sans-serif; font-size: 0.875rem; color: var(--purple-brand); text-decoration: none; margin-bottom: 1rem; transition: gap 0.2s; }
.btn-back:hover { gap: 0.75rem; }
@media (max-width: 900px) {
  .order-layout { grid-template-columns: 1fr; }
  .order-meta { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<header class="site-header" id="siteHeader">
  <div class="container">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <div class="logo-mark">HB</div>
        <div class="logo-text"><span class="logo-name">Halo Buds</span><span class="logo-tagline">Fully Handmade & Customized</span></div>
      </a>
      <div class="header-actions">
        <a href="cart.html" class="icon-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></a>
        <a href="account.html" class="icon-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
      </div>
    </div>
  </div>
</header>

<div class="page-hero">
  <div class="container">
    <span class="script-title">Your order</span>
    <h1 id="pageTitle">Order Details</h1>
    <div class="breadcrumb"><a href="account.html">My Account</a> / <a href="account.html#orders">Orders</a> / <span id="breadOrderNum">...</span></div>
  </div>
</div>

<div class="container">
  <div style="padding-top:2rem">
    <a href="account.html#orders" class="btn-back">← Back to Orders</a>
  </div>
  <div class="order-layout" id="orderLayout">
    <div style="text-align:center;padding:4rem;font-family:'Jost',sans-serif;color:var(--text-light);">Loading order...</div>
  </div>
</div>

<footer class="site-footer">
  <div class="container"><div class="footer-bottom"><p>© 2025 Halo Buds. All rights reserved.</p></div></div>
</footer>

<script type="module">
import { Orders, Auth, Utils } from '../js/config.js';
const { supabase } = Auth;

const params = new URLSearchParams(location.search);
const orderId = params.get('id');

const STATUS_STEPS = [
  { key: 'pending', label: 'Order Placed', icon: '📝', desc: 'Your order has been received.' },
  { key: 'confirmed', label: 'Order Confirmed', icon: '✅', desc: 'Payment verified, your order is confirmed.' },
  { key: 'processing', label: 'Being Crafted', icon: '🔨', desc: 'Our artisans are handcrafting your items with love.' },
  { key: 'shipped', label: 'Out for Delivery', icon: '🚚', desc: 'Your order is on its way!' },
  { key: 'delivered', label: 'Delivered', icon: '🎁', desc: 'Delivered! Enjoy your Halo Buds creation.' },
];
const STATUS_ORDER = ['pending','confirmed','processing','shipped','delivered'];

async function loadOrder() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }

  const order = await Orders.getById(orderId);
  if (!order) { document.getElementById('orderLayout').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;font-family:Jost,sans-serif;">Order not found.</div>'; return; }

  document.getElementById('pageTitle').textContent = `Order #${order.order_number}`;
  document.getElementById('breadOrderNum').textContent = `#${order.order_number}`;
  document.title = `Order #${order.order_number} — Halo Buds`;

  const statusIdx = STATUS_ORDER.indexOf(order.status);
  const timelineHtml = STATUS_STEPS.map((step, i) => {
    const done = i < statusIdx;
    const current = i === statusIdx;
    const cancelled = order.status === 'cancelled';
    return `<div class="timeline-item">
      <div class="timeline-dot ${done ? 'done' : current ? 'current' : ''}">${done ? '✓' : step.icon}</div>
      <div class="timeline-title" style="${current ? 'color:var(--purple-brand)' : done ? '' : 'color:var(--text-light)'}">${step.label}</div>
      <div class="timeline-desc" style="${!done && !current ? 'color:var(--text-light)' : ''}">${step.desc}</div>
      ${done || current ? `<div class="timeline-time">${Utils.formatDate(order.created_at)}</div>` : ''}
    </div>`;
  }).join('');

  const itemsHtml = (order.order_items || []).map(item => `
    <div class="order-item-row">
      <div class="item-img">${item.image_url ? `<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">` : '🌸'}</div>
      <div class="item-info">
        <a href="product.html?slug=${item.slug}" class="item-name">${item.product_name}</a>
        <div class="item-meta">Qty: ${item.quantity}${item.variant_name ? ' · ' + item.variant_name : ''}${item.custom_name ? ' · Custom: ' + item.custom_name : ''}</div>
      </div>
      <div class="item-price">${Utils.formatPrice((item.unit_price || 0) * item.quantity)}</div>
    </div>`).join('');

  const addr = order.shipping_address || {};
  const addrText = addr.first_name ? `${addr.first_name} ${addr.last_name}<br>${addr.address_line1}${addr.address_line2 ? ', '+addr.address_line2 : ''}<br>${addr.city}, ${addr.state} ${addr.pincode}<br>${addr.phone}` : 'Not available';

  document.getElementById('orderLayout').innerHTML = `
    <div class="order-left">
      <div class="panel">
        <div class="order-meta">
          <div class="meta-item"><div class="meta-label">Order Number</div><div class="meta-value">#${order.order_number}</div></div>
          <div class="meta-item"><div class="meta-label">Order Date</div><div class="meta-value">${Utils.formatDate(order.created_at)}</div></div>
          <div class="meta-item"><div class="meta-label">Status</div><div class="meta-value"><span class="status-badge status-${order.status}">${Utils.getOrderStatusLabel(order.status)}</span></div></div>
          <div class="meta-item"><div class="meta-label">Payment</div><div class="meta-value">${order.payment_method === 'cod' ? 'Cash on Delivery' : 'Online Payment'}</div></div>
          <div class="meta-item"><div class="meta-label">Payment Status</div><div class="meta-value">${order.payment_status === 'paid' ? '✅ Paid' : order.payment_method === 'cod' ? '⏳ Pay on Delivery' : '⏳ Pending'}</div></div>
          ${order.tracking_number ? `<div class="meta-item"><div class="meta-label">Tracking No.</div><div class="meta-value">${order.tracking_number}</div></div>` : ''}
        </div>
      </div>

      <div class="panel">
        <h3>📦 Order Progress</h3>
        ${order.status === 'cancelled' ? `<div style="background:#fff5f5;border:1px solid #fed7d7;border-radius:12px;padding:1rem;font-family:'Jost',sans-serif;font-size:0.875rem;color:#c53030;">This order was cancelled.</div>` : `<div class="timeline">${timelineHtml}</div>`}
      </div>

      <div class="panel">
        <h3>🛍️ Items in this Order</h3>
        ${itemsHtml || '<p style="font-family:Jost,sans-serif;color:var(--text-light);">No items found.</p>'}
      </div>
    </div>

    <div class="order-right">
      <div class="panel">
        <h3>💰 Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span>${Utils.formatPrice(order.subtotal || 0)}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${order.shipping_cost === 0 ? 'FREE' : Utils.formatPrice(order.shipping_cost || 0)}</span></div>
        ${order.discount > 0 ? `<div class="summary-row"><span>Discount</span><span style="color:#48bb78">-${Utils.formatPrice(order.discount)}</span></div>` : ''}
        <div class="summary-row total"><span>Total</span><span>${Utils.formatPrice(order.total_amount || 0)}</span></div>
      </div>

      <div class="panel">
        <h3>📍 Shipping Address</h3>
        <div class="shipping-info">${addrText}</div>
      </div>

      ${order.notes ? `<div class="panel"><h3>📝 Order Notes</h3><div class="shipping-info">${order.notes}</div></div>` : ''}
    </div>
  `;
}

loadOrder();
</script>
</body>
</html>
